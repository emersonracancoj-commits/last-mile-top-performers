apiVersion: apps/v1
kind: Deployment
metadata:
  name: forza-api
  labels:
    app.kubernetes.io/name: forza-api
    app.kubernetes.io/instance: last-mile-top-performers
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: forza-last-mile-top-performers
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/version: local
    forza.tech/standard-version: v2.1
    forza.tech/team: delivery
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: forza-api
      app.kubernetes.io/instance: last-mile-top-performers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forza-api
        app.kubernetes.io/instance: last-mile-top-performers
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: forza-last-mile-top-performers
        forza.tech/standard-version: v2.1
        forza.tech/team: delivery
    spec:
      containers:
        - name: forza-api
          image: ghcr.io/emersonracancoj/forza-api:latest-main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: forza-api-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
