apiVersion: apps/v1
kind: Deployment
metadata:
  name: forza-frontend
  labels:
    app.kubernetes.io/name: forza-frontend
    app.kubernetes.io/instance: last-mile-top-performers
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: forza-last-mile-top-performers
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/version: local
    forza.tech/standard-version: v2.1
    forza.tech/team: delivery
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: forza-frontend
      app.kubernetes.io/instance: last-mile-top-performers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forza-frontend
        app.kubernetes.io/instance: last-mile-top-performers
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: forza-last-mile-top-performers
        forza.tech/standard-version: v2.1
        forza.tech/team: delivery
    spec:
      containers:
        - name: forza-frontend
          image: forza-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
