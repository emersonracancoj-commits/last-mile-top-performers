name: CI-CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      API_IMAGE: ghcr.io/${{ github.repository_owner }}/forza-api:${{ github.sha }}
      API_IMAGE_LATEST: ghcr.io/${{ github.repository_owner }}/forza-api:latest-main
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/forza-frontend:${{ github.sha }}
      FRONTEND_IMAGE_LATEST: ghcr.io/${{ github.repository_owner }}/forza-frontend:latest-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Forza.LastMile.TopPerformers.WebAPI/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}
            ${{ env.API_IMAGE_LATEST }}

      - name: Debug file structure
        run: ls -R src/frontend

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_LATEST }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          if echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Kubeconfig loaded from base64 secret."
          else
            echo "$KUBE_CONFIG_DATA" > "$HOME/.kube/config"
            echo "Kubeconfig loaded from plain text secret."
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Create Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: forza-cluster

      - name: Apply manifests with deploy script
        shell: pwsh
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_EMAIL: ${{ secrets.GHCR_EMAIL }}
        run: ./deploy.ps1

      - name: Update deployments to new GHCR images
        shell: bash
        run: |
          kubectl -n forza set image deployment/forza-api forza-api="${API_IMAGE}"
          kubectl -n forza set image deployment/forza-frontend forza-frontend="${FRONTEND_IMAGE}"

      - name: Verify rollout
        shell: bash
        run: |
          kubectl -n forza rollout status deployment/forza-api --timeout=180s
          kubectl -n forza rollout status deployment/forza-frontend --timeout=180s
          kubectl get pods -n forza

      - name: Debug Deployment failure
        if: failure()
        run: |
          echo "--- PODS STATUS ---"
          kubectl get pods -n forza
          echo "--- DESCRIBE API POD ---"
          # Esto nos dirá el error de 'ImagePullBackOff' o el error de la app
          kubectl describe pod -n forza -l app=forza-api
          echo "--- LOGS API POD ---"
          kubectl logs -n forza -l app=forza-api

      - name: Update Kubernetes deployment with new image
        run: |
          kubectl set image deployment/forza-api forza-api=ghcr.io/${{ github.repository_owner }}/forza-api:latest-main -n forza
          kubectl set image deployment/forza-frontend forza-frontend=ghcr.io/${{ github.repository_owner }}/forza-frontend:latest-main -n forza