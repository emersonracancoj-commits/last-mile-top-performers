<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/50 p-4" role="dialog" aria-modal="true" aria-labelledby="incidencia-modal-title">
  <div class="w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-6 shadow-2xl">
    <div class="mb-4 flex items-start justify-between gap-4">
      <div>
        <h2 id="incidencia-modal-title" class="text-xl font-extrabold text-slate-900">Ajustar Meta por Incidencia</h2>
        <p class="mt-1 text-sm text-slate-600">Repartidor: {{ repartidorId() }}</p>
      </div>
      <button type="button" class="rounded-lg border border-slate-200 px-3 py-1 text-sm text-slate-700 hover:bg-slate-100" (click)="cancelar()">
        Cerrar
      </button>
    </div>

    <div class="space-y-4">
      <label class="block">
        <span class="mb-1 block text-sm font-semibold text-slate-700">Descripcion de la incidencia</span>
        <textarea
          [(ngModel)]="descripcion"
          rows="4"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none ring-cyan-500 transition focus:ring-2"
          placeholder="Ejemplo: trafico severo, cierre vial, lluvia intensa"></textarea>
      </label>

      <label class="block">
        <span class="mb-1 block text-sm font-semibold text-slate-700">Nueva meta diaria</span>
        <input
          [(ngModel)]="nuevaMeta"
          type="number"
          min="1"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none ring-cyan-500 transition focus:ring-2" />
      </label>

      @if (errorMessage()) {
        <p class="rounded-lg bg-rose-50 p-3 text-sm text-rose-700">{{ errorMessage() }}</p>
      }

      <div class="flex justify-end gap-2 pt-2">
        <button type="button" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" (click)="cancelar()">
          Cancelar
        </button>
        <button type="button" class="rounded-xl bg-cyan-600 px-4 py-2 text-sm font-semibold text-white hover:bg-cyan-700 disabled:cursor-not-allowed disabled:opacity-60" [disabled]="loading()" (click)="aprobar()">
          {{ loading() ? 'Guardando...' : 'Aprobar' }}
        </button>
      </div>
    </div>
  </div>
</div>
