<section class="min-h-screen bg-[radial-gradient(circle_at_top,_#cffafe_0%,_#eef2ff_45%,_#f8fafc_100%)] p-6">
  <div class="mx-auto flex min-h-[80vh] max-w-lg items-center justify-center">
    <article class="w-full rounded-3xl border border-cyan-100 bg-white p-8 text-center shadow-lg">
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-cyan-700">Forza Tech Access</p>
      <h1 class="mt-3 text-3xl font-black tracking-tight text-slate-900">Iniciar sesion</h1>
      <p class="mt-3 text-sm text-slate-600">Autenticate con Keycloak para acceder al dashboard de repartidores.</p>

      <button
        type="button"
        class="mt-6 w-full rounded-xl bg-cyan-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-cyan-700"
        (click)="login()">
        Entrar con Keycloak
      </button>
    </article>
  </div>
</section>
